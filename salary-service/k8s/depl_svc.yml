apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-depl
  namespace: 4team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salary
  template:
    metadata:
      labels:
        app: salary
    spec:
      containers:
        - name: salary
          # 수정 사항: ECR 주소 본인 계정 ID로 변경
          image: 716482800486.dkr.ecr.ap-northeast-2.amazonaws.com/4team/salary:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.3"
              memory: "250Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET_AT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: JWT_SECRET_AT
            - name: JWT_SECRET_RT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: JWT_SECRET_RT
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: AWS_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: salary-service
  namespace: 4team
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: salary
