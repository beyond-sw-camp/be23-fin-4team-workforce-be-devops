server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  application:
    name: member-service
  redis:
    host: ${REDIS_HOST:redis-service}
    port: ${REDIS_PORT:6379}
  redis-stack:
    host: ${REDIS_STACK_HOST:redis-stack-service}
    port: ${REDIS_STACK_PORT:6380}
  kafka:
    kafka-server: ${KAFKA_BOOTSTRAP_SERVERS:kafka-service:9092}
    consumer:
      group-id: member-service
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:workforcehr}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 35MB
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: MemberQuartzScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.isClustered: false
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  expirationAt: 1440
  secretKeyAt: ${JWT_SECRET_AT}
  expirationRt: 1440
  secretKeyRt: ${JWT_SECRET_RT}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET:workforce-profiles}
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

# 국세청 API
nts:
  api:
    url: https://api.odcloud.kr/api/nts-businessman/v1
    key: ${NTS_API_KEY}

# 공휴일 API
public:
  api:
    holiday:
      key: ${HOLIDAY_API_KEY}

n8n:
  webhook:
    url: ${N8N_WEBHOOK_URL:http://n8n-service:5678/webhook/chatbot-agent}

# 실시간 채팅
member-chat:
  enabled: true
  websocket:
    endpoint: /mc/connect
    allowed-origins:
      - https://www.workforcehr.shop
      - http://localhost:3000
  stomp:
    app-prefix: /mc/app
    topic-prefix: /mc/topic
    user-prefix: /user
  redis:
    channel-prefix: "member-chat:room:"
  files:
    bucket: ${aws.s3.bucket}
    max-size-mb: 20
    allowed-mimes:
      - image/png
      - image/jpeg
      - image/webp
      - image/gif
      - application/pdf
    presigned-ttl-seconds: 300
  retention:
    default-days: 1095
    batch-cron: "0 0 3 * * *"
  rate-limit:
    messages-per-minute: 60
    burst: 20

openai:
  api:
    key: ${OPENAI_API_KEY}

# Eureka 비활성화 (K8s Service DNS 사용)
eureka:
  client:
    enabled: false

# 데모 시드 토글
seed:
  demo:
    enabled: ${SEED_DEMO_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
