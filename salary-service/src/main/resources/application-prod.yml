server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  application:
    name: salary-service
  redis:
    host: ${REDIS_HOST:redis-service}
    port: ${REDIS_PORT:6379}
  kafka:
    kafka-server: ${KAFKA_BOOTSTRAP_SERVERS:kafka-service:9092}
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:workforce}?useSsl=true&trustServerCertificate=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show_sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: salary-hr-batch
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.isClustered: false
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
  batch:
    jdbc:
      initialize-schema: never

salary:
  auto-create:
    default-base-salary: 0

jwt:
  expirationAt: 30
  secretKeyAt: ${JWT_SECRET_AT}
  expirationRt: 1440
  secretKeyRt: ${JWT_SECRET_RT}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET:workforce-profiles}
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

# Eureka 비활성화 (K8s Service DNS 사용)
eureka:
  client:
    enabled: false

batch:
  scheduler:
    enabled: true
    jobs:
      dailyAttendanceDraftJob: "0 0 2 * * ?"
      dailyAttendanceFinalJob: "0 0 14 * * ?"
      weeklyLimitCheckJob: "0 0 3 * * ?"
      overtimeExpirationJob: "0 0 * * * ?"
      slotDeadlineAutoAssignJob: "0 0 1 * * ?"
      unusedLeaveAutoPayoutJob: "0 50 2 * * ?"
      leaveExpireJob:          "0 0 3 * * ?"
      leavePromotionJob:       "0 30 6 * * ?"
    perCompanyJobs:
      payrollCalculateJob:        "0 0 1 25 * ?"
      severancePayJob:            "0 0 2 25 * ?"
      payslipSendJob:             "0 0 9 25 * ?"
      regularBonusPaymentJob:     "0 0 9 25 * ?"
      monthlyAttendanceCloseJob:  "0 0 0 3 * ?"
      leaveGrantJob:              "0 0 5 1 * ?"
      carryoverLeaveJob:          "0 0 0 1 1 ?"

seed:
  demo:
    enabled: ${SEED_DEMO_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# K8s 서비스 직접 호출 (Eureka 비활성 환경)
feign:
  url:
    approval-service: http://approval-service:8080
    member-service: http://member-service:8080

# Feign Client timeout (콜드 스타트 대응)
spring.cloud.openfeign.client.config.default.connect-timeout: 30000
spring.cloud.openfeign.client.config.default.read-timeout: 30000