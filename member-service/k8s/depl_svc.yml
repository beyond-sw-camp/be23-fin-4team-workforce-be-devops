apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-depl
  namespace: 4team
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: member
          # 수정 사항: ECR 주소 본인 계정 ID로 변경
          image: 716482800486.dkr.ecr.ap-northeast-2.amazonaws.com/4team/member:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "1.5Gi"
            requests:
              cpu: "0.3"
              memory: "768Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # DB (RDS)
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: DB_PASSWORD
            # JWT
            - name: JWT_SECRET_AT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: JWT_SECRET_AT
            - name: JWT_SECRET_RT
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: JWT_SECRET_RT
            # AWS
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: AWS_SECRET_KEY
            # Mail
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: MAIL_PASSWORD
            # OpenAI
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: OPENAI_API_KEY
            # External APIs
            - name: NTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: NTS_API_KEY
            - name: HOLIDAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workforce-secrets
                  key: HOLIDAY_API_KEY
            - name: SEED_DEMO_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: member-service
  namespace: 4team
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: member
